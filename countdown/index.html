<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #4a90e2;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            justify-content: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-align: center;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .countdown-container {
            display: flex;
            gap: 20px;
            text-align: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box {
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            min-width: 100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
        }

        .time-box span {
            display: block;
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary);
            line-height: 1;
        }

        .time-box .label {
            font-size: 1.1rem;
            color: #666;
            margin-top: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn {
            margin-top: 50px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #357abd;
        }

        .expired-message {
            font-size: 2rem;
            color: #e74c3c;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Countdown Timer</h1>
    <p class="subtitle" id="target-date-display">Loading target date...</p>

    <div class="countdown-container" id="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Minutes</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Seconds</div>
        </div>
    </div>
    
    <div class="expired-message" id="expired">The countdown has ended!</div>

    <a href="../" class="back-btn">← Back to Home</a>

    <script>
        // ==========================================
        // SET YOUR TARGET DATE AND TIME HERE
        // Format: "Month DD, YYYY HH:MM:SS"
        // Example: "Jan 1, 2027 00:00:00"
        // ==========================================
        const targetDateString = "Dec 31, 2026 23:59:59";
        
        // Update the subtitle to show what we are counting down to
        document.getElementById("target-date-display").innerText = "Counting down to " + targetDateString;

        const countDownDate = new Date(targetDateString).getTime();

        // Update the countdown every 1 second
        const x = setInterval(function() {

            // Get today's date and time
            const now = new Date().getTime();

            // Find the distance between now and the count down date
            const distance = countDownDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display the result with leading zeros
            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

            // If the count down is finished, write some text
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("expired").style.display = "block";
            }
        }, 1000);
    </script>
</body>
</html>
